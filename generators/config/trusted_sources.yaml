# ニュースRSS信頼ソースホワイトリスト（Phase 2更新: 2026-04-04）
# Reuters は feeds.reuters.com が全ドメイン接続不可のため削除
# CNBC: 正規URLに変更、Yahoo Finance / MarketWatch を追加

rss_feeds:
  - name: "CNBC Finance"
    url: "https://www.cnbc.com/id/10000664/device/rss/rss.html"
    category: "米国金融"
    language: "en"
  - name: "CNBC Markets"
    url: "https://www.cnbc.com/id/15839135/device/rss/rss.html"
    category: "米国金融"
    language: "en"
  - name: "Yahoo Finance"
    url: "https://finance.yahoo.com/news/rssindex"
    category: "米国金融"
    language: "en"
  - name: "MarketWatch"
    url: "https://feeds.marketwatch.com/marketwatch/topstories/"
    category: "米国金融"
    language: "en"
  - name: "NHK経済"
    url: "https://www3.nhk.or.jp/rss/news/cat4.xml"
    category: "日本金融"
    language: "ja"

# 1ソースあたり最大取得件数
max_items_per_feed: 10

# TOP5選択時の優先順位（カテゴリ）
priority_categories:
  - "米国金融"
  - "日本金融"
