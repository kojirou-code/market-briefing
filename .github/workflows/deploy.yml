name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "hugo-site/content/**"
      - "hugo-site/static/**"
      - "hugo-site/layouts/**"
      - "hugo-site/hugo.toml"
      - "hugo-site/themes/**"

  # 手動実行も可能
  workflow_dispatch:

# GitHub Pages への書き込み権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイ防止
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # PaperMod テーマ取得
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo Site
        run: |
          cd hugo-site
          hugo --minify --buildFuture

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
